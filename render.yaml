services:
  - type: web
    name: hitachi-cricket
    runtime: node
    plan: free
    region: singapore
    buildCommand: npm ci && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_VERSION
        value: 20.11.1
      - key: DATABASE_URL
        value: file:/var/data/dev.db
      - key: ADMIN_USERNAME
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: SESSION_SECRET
        generateValue: true
    disk:
      name: cricket-data
      mountPath: /var/data
      sizeGB: 1
